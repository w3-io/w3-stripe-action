name: 'W3 Stripe Action'
description: 'Complete Stripe integration — payments, customers, subscriptions, invoices, products, prices, refunds, payouts, balance, transfers, and crypto onramp'
author: 'w3-io'

inputs:
  command:
    description: >
      Operation to perform. See docs/guide.md for the full list of 41 commands
      across payments, customers, subscriptions, invoices, products, prices,
      balance, refunds, payouts, transfers, disputes, and events.
    required: true
  api-key:
    description: 'Stripe API key (sk_test_... or sk_live_...)'
    required: true
  api-url:
    description: 'Stripe API base URL override'
    required: false

  # Payment inputs
  amount:
    description: 'Amount in smallest currency unit (e.g. cents). "1000" = $10.00'
    required: false
  currency:
    description: 'Three-letter ISO currency code (default: usd)'
    required: false
    default: 'usd'
  payment-id:
    description: 'Payment intent ID (pi_...)'
    required: false
  payment-method:
    description: 'Payment method ID for confirm-payment (pm_...)'
    required: false
  description:
    description: 'Description for payment, customer, product, invoice, or payout'
    required: false
  metadata:
    description: 'JSON object of key-value metadata'
    required: false

  # Customer inputs
  customer-id:
    description: 'Customer ID (cus_...)'
    required: false
  email:
    description: 'Customer email address'
    required: false
  name:
    description: 'Customer or product name'
    required: false

  # Product/Price inputs
  product-id:
    description: 'Product ID (prod_...)'
    required: false
  price-id:
    description: 'Price ID (price_...)'
    required: false
  unit-amount:
    description: 'Price per unit in cents'
    required: false
  recurring-interval:
    description: 'Recurring interval for prices: day, week, month, or year'
    required: false

  # Subscription inputs
  subscription-id:
    description: 'Subscription ID (sub_...)'
    required: false
  status:
    description: 'Filter by status (e.g. active, canceled, past_due)'
    required: false

  # Invoice inputs
  invoice-id:
    description: 'Invoice ID (in_...)'
    required: false

  # Refund inputs
  refund-id:
    description: 'Refund ID (re_...)'
    required: false
  reason:
    description: 'Refund reason: duplicate, fraudulent, or requested_by_customer'
    required: false

  # Payout inputs
  payout-id:
    description: 'Payout ID (po_...)'
    required: false

  # Transfer inputs (Connect)
  transfer-id:
    description: 'Transfer ID (tr_...)'
    required: false
  destination:
    description: 'Connected account ID for transfers (acct_...)'
    required: false

  # Dispute inputs
  dispute-id:
    description: 'Dispute ID (dp_...)'
    required: false

  # Event inputs
  event-id:
    description: 'Event ID (evt_...)'
    required: false
  event-type:
    description: 'Event type filter (e.g. payment_intent.succeeded, customer.created)'
    required: false

  # Balance transaction inputs
  type:
    description: 'Balance transaction type filter (charge, refund, payout, etc.)'
    required: false

  # List inputs
  limit:
    description: 'Maximum results to return (default: 10)'
    required: false
    default: '10'

  # Crypto Onramp inputs
  session-id:
    description: 'Onramp session ID (cos_...)'
    required: false
  wallet-addresses:
    description: 'JSON object mapping network to wallet address (e.g. {"ethereum":"0x...","solana":"..."})'
    required: false
  lock-wallet-address:
    description: 'Prevent customer from changing wallet address (true/false)'
    required: false
  source-currency:
    description: 'Fiat currency for onramp (usd or eur)'
    required: false
  source-amount:
    description: 'Fiat amount for onramp (e.g. "100.00")'
    required: false
  destination-currency:
    description: 'Target cryptocurrency (btc, eth, sol, usdc, matic, avax, xlm)'
    required: false
  destination-network:
    description: 'Target blockchain (bitcoin, ethereum, solana, polygon, avalanche, stellar, base)'
    required: false
  destination-amount:
    description: 'Crypto amount to purchase (mutually exclusive with source-amount)'
    required: false
  destination-currencies:
    description: 'Comma-separated list of allowed cryptocurrencies'
    required: false
  destination-networks:
    description: 'Comma-separated list of allowed networks'
    required: false
  customer-email:
    description: 'Customer email for onramp KYC pre-fill'
    required: false
  customer-ip-address:
    description: 'Customer IP for geographic validation'
    required: false

  # Request configuration
  max-retries:
    description: 'Maximum retry attempts on 429/5xx (default: 3)'
    required: false
    default: '3'
  timeout:
    description: 'Request timeout in seconds (default: 30)'
    required: false
    default: '30'

outputs:
  result:
    description: 'JSON result of the operation'

runs:
  using: 'node24'
  main: 'dist/index.js'
