name: Stripe payment example

on:
  workflow_dispatch:
    inputs:
      amount:
        description: 'Payment amount in cents (1000 = $10.00)'
        required: true
      email:
        description: 'Customer email'
        required: true

jobs:
  payment:
    runs-on: ubuntu-latest
    steps:
      - name: Create customer
        id: customer
        uses: w3-io/w3-stripe-action@v0
        with:
          command: create-customer
          api-key: ${{ secrets.STRIPE_API_KEY }}
          email: ${{ inputs.email }}

      - name: Create payment
        id: payment
        uses: w3-io/w3-stripe-action@v0
        with:
          command: create-payment
          api-key: ${{ secrets.STRIPE_API_KEY }}
          amount: ${{ inputs.amount }}
          customer-id: ${{ fromJSON(steps.customer.outputs.result).id }}

      - name: Show result
        run: |
          echo "Payment created:"
          echo '${{ steps.payment.outputs.result }}' | jq .

  balance:
    runs-on: ubuntu-latest
    steps:
      - name: Check balance
        id: balance
        uses: w3-io/w3-stripe-action@v0
        with:
          command: get-balance
          api-key: ${{ secrets.STRIPE_API_KEY }}

      - name: Show balance
        run: |
          echo "Account balance:"
          echo '${{ steps.balance.outputs.result }}' | jq '.available[] | "\(.currency): \(.amount / 100)"'
