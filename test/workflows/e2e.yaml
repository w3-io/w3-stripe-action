# E2E Test Workflow — Full Coverage
#
# Exercises every command against Stripe test-mode APIs.
# Run on a local W3 network with:
#   w3 workflow deploy test/workflows/e2e.yaml
#   w3 workflow "stripe-e2e" trigger
#
# Prerequisites:
#   - W3 local network running (make dev)
#   - W3_SECRET_STRIPE_API_KEY set to a Stripe test-mode key (sk_test_*)
#
# Commands covered: 39/39 (100%)

name: stripe-e2e
on:
  workflow_dispatch: {}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      # ── Customers ──────────────────────────────────────────────────────────

      - name: Create a test customer
        id: create_customer
        uses: w3-io/w3-stripe-action@v0
        with:
          command: create-customer
          api-key: ${{ secrets.STRIPE_API_KEY }}
          email: e2e-test@example.com
          name: E2E Test Customer
          description: Created by W3 e2e test workflow

      - name: List customers
        uses: w3-io/w3-stripe-action@v0
        with:
          command: list-customers
          api-key: ${{ secrets.STRIPE_API_KEY }}
          limit: "5"

      - name: Get the created customer
        uses: w3-io/w3-stripe-action@v0
        with:
          command: get-customer
          api-key: ${{ secrets.STRIPE_API_KEY }}
          customer-id: ${{ fromJSON(steps.create_customer.outputs.result).id }}

      - name: Update customer metadata
        uses: w3-io/w3-stripe-action@v0
        with:
          command: update-customer
          api-key: ${{ secrets.STRIPE_API_KEY }}
          customer-id: ${{ fromJSON(steps.create_customer.outputs.result).id }}
          metadata: '{"source": "e2e-test"}'

      # ── Products & Prices ──────────────────────────────────────────────────

      - name: Create a product
        id: create_product
        uses: w3-io/w3-stripe-action@v0
        with:
          command: create-product
          api-key: ${{ secrets.STRIPE_API_KEY }}
          name: E2E Test Product
          description: Test product for e2e workflow

      - name: List products
        uses: w3-io/w3-stripe-action@v0
        with:
          command: list-products
          api-key: ${{ secrets.STRIPE_API_KEY }}
          limit: "5"

      - name: Get the created product
        uses: w3-io/w3-stripe-action@v0
        with:
          command: get-product
          api-key: ${{ secrets.STRIPE_API_KEY }}
          product-id: ${{ fromJSON(steps.create_product.outputs.result).id }}

      - name: Create a one-time price
        id: create_onetime_price
        uses: w3-io/w3-stripe-action@v0
        with:
          command: create-price
          api-key: ${{ secrets.STRIPE_API_KEY }}
          product-id: ${{ fromJSON(steps.create_product.outputs.result).id }}
          unit-amount: "2500"
          currency: usd

      - name: Create a recurring price
        id: create_recurring_price
        uses: w3-io/w3-stripe-action@v0
        with:
          command: create-price
          api-key: ${{ secrets.STRIPE_API_KEY }}
          product-id: ${{ fromJSON(steps.create_product.outputs.result).id }}
          unit-amount: "999"
          currency: usd
          recurring-interval: month

      - name: List prices
        uses: w3-io/w3-stripe-action@v0
        with:
          command: list-prices
          api-key: ${{ secrets.STRIPE_API_KEY }}
          limit: "5"

      - name: Get the one-time price
        uses: w3-io/w3-stripe-action@v0
        with:
          command: get-price
          api-key: ${{ secrets.STRIPE_API_KEY }}
          price-id: ${{ fromJSON(steps.create_onetime_price.outputs.result).id }}

      # ── Payment Lifecycle (create -> confirm -> capture -> refund) ─────────

      - name: Create a payment intent (manual capture)
        id: create_capture_payment
        uses: w3-io/w3-stripe-action@v0
        with:
          command: create-payment
          api-key: ${{ secrets.STRIPE_API_KEY }}
          amount: "5000"
          currency: usd
          customer-id: ${{ fromJSON(steps.create_customer.outputs.result).id }}
          description: E2E test payment for capture lifecycle
          metadata: '{"capture_method": "manual"}'

      - name: Confirm the payment intent with test card
        id: confirm_payment
        uses: w3-io/w3-stripe-action@v0
        with:
          command: confirm-payment
          api-key: ${{ secrets.STRIPE_API_KEY }}
          payment-id: ${{ fromJSON(steps.create_capture_payment.outputs.result).id }}
          payment-method: pm_card_visa

      - name: Capture the confirmed payment
        id: capture_payment
        uses: w3-io/w3-stripe-action@v0
        with:
          command: capture-payment
          api-key: ${{ secrets.STRIPE_API_KEY }}
          payment-id: ${{ fromJSON(steps.create_capture_payment.outputs.result).id }}

      - name: Create a refund for the captured payment
        id: create_refund
        uses: w3-io/w3-stripe-action@v0
        with:
          command: create-refund
          api-key: ${{ secrets.STRIPE_API_KEY }}
          payment-id: ${{ fromJSON(steps.create_capture_payment.outputs.result).id }}
          amount: "2500"
          reason: requested_by_customer

      - name: Extract refund ID
        id: refund
        run: |
          echo "id=$(echo '${{ steps.create_refund.outputs.result }}' | jq -r '.id')" >> "$GITHUB_OUTPUT"

      - name: Get the refund
        uses: w3-io/w3-stripe-action@v0
        with:
          command: get-refund
          api-key: ${{ secrets.STRIPE_API_KEY }}
          refund-id: ${{ steps.refund.outputs.id }}

      - name: List refunds
        uses: w3-io/w3-stripe-action@v0
        with:
          command: list-refunds
          api-key: ${{ secrets.STRIPE_API_KEY }}
          limit: "5"

      # ── Payments (simple create, get, list, cancel) ────────────────────────

      - name: Create a payment intent
        id: create_payment
        uses: w3-io/w3-stripe-action@v0
        with:
          command: create-payment
          api-key: ${{ secrets.STRIPE_API_KEY }}
          amount: "3000"
          currency: usd
          customer-id: ${{ fromJSON(steps.create_customer.outputs.result).id }}
          description: E2E test payment for cancel

      - name: Get the payment intent
        uses: w3-io/w3-stripe-action@v0
        with:
          command: get-payment
          api-key: ${{ secrets.STRIPE_API_KEY }}
          payment-id: ${{ fromJSON(steps.create_payment.outputs.result).id }}

      - name: List payment intents
        uses: w3-io/w3-stripe-action@v0
        with:
          command: list-payments
          api-key: ${{ secrets.STRIPE_API_KEY }}
          limit: "5"

      - name: Cancel the payment intent
        uses: w3-io/w3-stripe-action@v0
        with:
          command: cancel-payment
          api-key: ${{ secrets.STRIPE_API_KEY }}
          payment-id: ${{ fromJSON(steps.create_payment.outputs.result).id }}

      # ── Invoices (create -> get -> pay -> list) ────────────────────────────

      - name: Create an invoice
        id: create_invoice
        uses: w3-io/w3-stripe-action@v0
        with:
          command: create-invoice
          api-key: ${{ secrets.STRIPE_API_KEY }}
          customer-id: ${{ fromJSON(steps.create_customer.outputs.result).id }}
          description: E2E test invoice

      - name: Get the invoice
        uses: w3-io/w3-stripe-action@v0
        with:
          command: get-invoice
          api-key: ${{ secrets.STRIPE_API_KEY }}
          invoice-id: ${{ fromJSON(steps.create_invoice.outputs.result).id }}

      - name: Pay the invoice
        uses: w3-io/w3-stripe-action@v0
        with:
          command: pay-invoice
          api-key: ${{ secrets.STRIPE_API_KEY }}
          invoice-id: ${{ fromJSON(steps.create_invoice.outputs.result).id }}

      - name: List invoices
        uses: w3-io/w3-stripe-action@v0
        with:
          command: list-invoices
          api-key: ${{ secrets.STRIPE_API_KEY }}
          limit: "5"

      # ── Subscriptions (create -> list -> get -> cancel) ────────────────────
      # Uses a test payment method (pm_card_visa) attached inline via
      # the customer's default source. Stripe test mode supports this.

      - name: Attach test payment method to customer
        id: attach_pm
        env:
          STRIPE_API_KEY: ${{ secrets.STRIPE_API_KEY }}
          CUSTOMER_ID: ${{ fromJSON(steps.create_customer.outputs.result).id }}
        run: |
          curl -s -X POST "https://api.stripe.com/v1/payment_methods/pm_card_visa/attach" \
            -u "${STRIPE_API_KEY}:" \
            -d "customer=${CUSTOMER_ID}"
          curl -s -X POST "https://api.stripe.com/v1/customers/${CUSTOMER_ID}" \
            -u "${STRIPE_API_KEY}:" \
            -d "invoice_settings[default_payment_method]=pm_card_visa"
      - name: Create a subscription
        id: create_subscription
        uses: w3-io/w3-stripe-action@v0
        with:
          command: create-subscription
          api-key: ${{ secrets.STRIPE_API_KEY }}
          customer-id: ${{ fromJSON(steps.create_customer.outputs.result).id }}
          price-id: ${{ fromJSON(steps.create_recurring_price.outputs.result).id }}

      - name: List subscriptions
        uses: w3-io/w3-stripe-action@v0
        with:
          command: list-subscriptions
          api-key: ${{ secrets.STRIPE_API_KEY }}
          limit: "5"

      - name: Get the subscription
        uses: w3-io/w3-stripe-action@v0
        with:
          command: get-subscription
          api-key: ${{ secrets.STRIPE_API_KEY }}
          subscription-id: ${{ fromJSON(steps.create_subscription.outputs.result).id }}

      - name: Cancel the subscription
        uses: w3-io/w3-stripe-action@v0
        with:
          command: cancel-subscription
          api-key: ${{ secrets.STRIPE_API_KEY }}
          subscription-id: ${{ fromJSON(steps.create_subscription.outputs.result).id }}

      # ── Balance ────────────────────────────────────────────────────────────

      - name: Get account balance
        uses: w3-io/w3-stripe-action@v0
        with:
          command: get-balance
          api-key: ${{ secrets.STRIPE_API_KEY }}

      - name: List balance transactions
        uses: w3-io/w3-stripe-action@v0
        with:
          command: list-balance-transactions
          api-key: ${{ secrets.STRIPE_API_KEY }}
          limit: "5"

      # ── Payouts ────────────────────────────────────────────────────────────
      # SKIP: create-payout requires connected account with available balance
      # SKIP: get-payout requires a payout ID from create-payout
      # SKIP: cancel-payout requires a pending payout ID

      - name: List payouts
        uses: w3-io/w3-stripe-action@v0
        with:
          command: list-payouts
          api-key: ${{ secrets.STRIPE_API_KEY }}
          limit: "5"

      # ── Transfers ──────────────────────────────────────────────────────────
      # SKIP: create-transfer requires a connected account (Stripe Connect)
      # SKIP: get-transfer requires a transfer ID from create-transfer

      - name: List transfers
        uses: w3-io/w3-stripe-action@v0
        with:
          command: list-transfers
          api-key: ${{ secrets.STRIPE_API_KEY }}
          limit: "5"

      # ── Disputes ───────────────────────────────────────────────────────────
      # SKIP: get-dispute requires a real disputed payment

      - name: List disputes
        uses: w3-io/w3-stripe-action@v0
        with:
          command: list-disputes
          api-key: ${{ secrets.STRIPE_API_KEY }}
          limit: "5"

      # ── Events ─────────────────────────────────────────────────────────────

      - name: List events
        id: list_events
        uses: w3-io/w3-stripe-action@v0
        with:
          command: list-events
          api-key: ${{ secrets.STRIPE_API_KEY }}
          limit: "5"

      - name: Extract first event ID
        id: event
        run: |
          echo "id=$(echo '${{ steps.list_events.outputs.result }}' | jq -r '.data[0].id')" >> "$GITHUB_OUTPUT"

      - name: Get an event
        uses: w3-io/w3-stripe-action@v0
        with:
          command: get-event
          api-key: ${{ secrets.STRIPE_API_KEY }}
          event-id: ${{ steps.event.outputs.id }}

      # ── Crypto Onramp ──────────────────────────────────────────────────────
      # SKIP: create-onramp-session requires Stripe Onramp beta access
      # SKIP: get-onramp-session requires an onramp session ID
      # SKIP: get-onramp-quotes requires Stripe Onramp beta access

      # ── Cleanup ────────────────────────────────────────────────────────────

      - name: Delete the test customer
        uses: w3-io/w3-stripe-action@v0
        with:
          command: delete-customer
          api-key: ${{ secrets.STRIPE_API_KEY }}
          customer-id: ${{ fromJSON(steps.create_customer.outputs.result).id }}
